<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JxU ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  border: 10px solid #ff4d6d;
  padding: 20px;
  gap: 20px;
}

h1 {
  font-size: 9vw;
  letter-spacing: 10px;
  color: #ff4d6d;
}

h2 {
  color: #ccc;
  text-align: center;
}

#timer {
  font-size: 1.5rem;
  padding: 10px 20px;
  border: 1px solid #ff4d6d;
  border-radius: 10px;
  background: rgba(255,77,109,0.1);
}

.fuel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

.fuel-text {
  font-size: 0.9rem;
  color: #aaa;
  text-align: center;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  background: #ff2e63;
  transform: scale(1.05);
}

.calendar {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ff4d6d;
  width: 300px;
}

.calendar h3 {
  text-align: center;
  margin-bottom: 10px;
  color: #ff4d6d;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  text-align: center;
  padding: 8px 0;
  border-radius: 50%;
}

.past {
  background-color: #28a745;
}

.today {
  background-color: #ff4d6d;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>JxU</h1>
<h2>Every second with you is a moment I cherish forever ❤️</h2>

<div id="timer"></div>

<div class="fuel-section">

<svg viewBox="0 0 100 100" width="160" height="160">
<defs>
  <clipPath id="heartClip">
    <path d="M50 88 C20 65,5 40,25 22 C38 10,50 22,50 22 C50 22,62 10,75 22 C95 40,80 65,50 88 Z"/>
  </clipPath>
  <linearGradient id="waveGradient" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#ff2e63"/>
    <stop offset="100%" stop-color="#ff9bb3"/>
  </linearGradient>
</defs>

<path d="M50 88 C20 65,5 40,25 22 C38 10,50 22,50 22 C50 22,62 10,75 22 C95 40,80 65,50 88 Z"
fill="#1a1a1a" stroke="#ff4d6d" stroke-width="2"/>

<g clip-path="url(#heartClip)">
  <path id="wave" fill="url(#waveGradient)"></path>
</g>
</svg>

<div class="fuel-text">
As long as this isn't empty, I'm thinking about you ❤️
</div>

<button onclick="refuel()">Refuel ❤️</button>

</div>

<div class="calendar">
  <h3 id="monthYear"></h3>
  <div class="days" id="calendarDays"></div>
</div>

<script>
// TIMER
const startDate = new Date("2024-02-24T00:00:00");

function updateTimer() {
  const now = new Date();
  let diff = now - startDate;

  const s = Math.floor(diff / 1000) % 60;
  const m = Math.floor(diff / (1000 * 60)) % 60;
  const h = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const d = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("timer").innerText =
    `${d} Days ${h} Hours ${m} Minutes ${s} Seconds`;
}
setInterval(updateTimer, 1000);
updateTimer();


// FUEL SYSTEM
let manualFuel = null;

function getFuelLevel() {
  if (manualFuel !== null) return manualFuel;

  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon ... 6=Sat

  // Hours elapsed since Sunday 00:00
  const hoursElapsed = day * 24 + now.getHours() + now.getMinutes() / 60;
  const totalWeekHours = 7 * 24; // 168 hours

  // Drain from 100% down to 20% over the full week — never goes below 20%
  const percent = 100 - (hoursElapsed / totalWeekHours) * 80;

  return Math.max(20, Math.min(100, percent));
}


// WAVE
let phase = 0;

function updateWave() {
  const percent = getFuelLevel();
  const height = 100 - percent;
  const wave = document.getElementById("wave");

  let path = `M 0 ${height}`;
  for (let x = 0; x <= 100; x++) {
    let y = height + Math.sin((x + phase) * 0.15) * 2;
    path += ` L ${x} ${y}`;
  }

  path += ` L 100 100 L 0 100 Z`;
  wave.setAttribute("d", path);

  phase += 2;
}
setInterval(updateWave, 50);


// HASH
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

const correctHash = "88d4c34210eaf9e8bd973f8bca42faccdbb60907e2af64d37da46e3dd151b816";

async function refuel() {
  const input = prompt("Enter the secret code ❤️");
  if (!input) return;

  const hash = await sha256(input);

  if (hash === correctHash) {
    manualFuel = 100;
    alert("Refueled with love ❤️");
  } else {
    alert("Wrong code 💔");
  }
}


// CALENDAR
function generateCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const calendarDays = document.getElementById("calendarDays");
  const monthYear = document.getElementById("monthYear");

  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  monthYear.innerText = `${monthNames[month]} ${year}`;
  calendarDays.innerHTML = "";

  for (let i = 0; i < firstDay; i++) {
    calendarDays.innerHTML += `<div></div>`;
  }

  for (let day = 1; day <= lastDate; day++) {
    let className = "day";
    if (day < today) className += " past";
    if (day === today) className += " today";
    calendarDays.innerHTML += `<div class="${className}">${day}</div>`;
  }
}

generateCalendar();
</script>

</body>
</html>
