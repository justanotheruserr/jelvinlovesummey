<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JxU ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  border: 10px solid transparent;
  padding: 20px;
  gap: 20px;
  position: relative;
  overflow-x: hidden;
  transition: border-color 0.6s ease;
}

body.revealed {
  border-color: #ff4d6d;
}

/* Shooting stars canvas behind everything */
#starsCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* All content above stars */
body > *:not(#starsCanvas) {
  position: relative;
  z-index: 1;
}

h1 {
  font-size: 9vw;
  letter-spacing: 10px;
  color: #ff4d6d;
}

h2 {
  color: #ccc;
  text-align: center;
}

#timer {
  font-size: 1.5rem;
  padding: 10px 20px;
  border: 1px solid #ff4d6d;
  border-radius: 10px;
  background: rgba(255,77,109,0.1);
}

/* GLITCH BOX */
.glitch-wrap {
  position: relative;
  width: 320px;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.glitch-lang {
  font-size: 0.7rem;
  color: #ff4d6d;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.2s;
}

.glitch-text {
  font-size: 1.3rem;
  font-weight: bold;
  color: #fff;
  text-align: center;
  position: relative;
  opacity: 0;
  letter-spacing: 1px;
}

.glitch-text.visible {
  opacity: 1;
  animation: glitchIn 0.4s steps(1) forwards;
}

.glitch-text.hiding {
  animation: glitchOut 0.4s steps(1) forwards;
}

.glitch-lang.visible { opacity: 1; }

@keyframes glitchIn {
  0%   { opacity:0; clip-path: inset(40% 0 40% 0); transform: translateX(-4px) skewX(-5deg); color: #ff4d6d; }
  10%  { opacity:1; clip-path: inset(0% 0 80% 0);  transform: translateX(4px) skewX(3deg); color: #fff; }
  20%  { clip-path: inset(60% 0 10% 0); transform: translateX(-3px); color: #ff9bb3; }
  30%  { clip-path: inset(10% 0 60% 0); transform: translateX(3px); color: #fff; }
  40%  { clip-path: inset(80% 0 0% 0);  transform: translateX(-2px) skewX(2deg); }
  50%  { clip-path: inset(0% 0 0% 0);   transform: translateX(0); color: #ff4d6d; }
  60%  { clip-path: inset(20% 0 20% 0); transform: translateX(2px); color: #fff; }
  70%  { clip-path: inset(0% 0 0% 0);   transform: translateX(-1px); }
  85%  { clip-path: inset(5% 0 5% 0);   transform: translateX(1px); color: #ff9bb3; }
  100% { opacity:1; clip-path: inset(0% 0 0% 0); transform: translateX(0) skewX(0); color: #fff; }
}

@keyframes glitchOut {
  0%   { opacity:1; clip-path: inset(0% 0 0% 0); transform: translateX(0); color: #fff; }
  15%  { clip-path: inset(20% 0 30% 0); transform: translateX(4px) skewX(3deg); color: #ff4d6d; }
  30%  { clip-path: inset(50% 0 10% 0); transform: translateX(-4px); color: #ff9bb3; }
  45%  { clip-path: inset(10% 0 60% 0); transform: translateX(3px) skewX(-4deg); color: #fff; }
  60%  { clip-path: inset(70% 0 5% 0);  transform: translateX(-2px); color: #ff4d6d; }
  75%  { clip-path: inset(0% 0 80% 0);  transform: translateX(2px) skewX(2deg); }
  90%  { opacity:0.3; clip-path: inset(40% 0 40% 0); transform: translateX(-3px); }
  100% { opacity:0; clip-path: inset(50% 0 50% 0); transform: translateX(0); }
}

.glitch-wrap::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(255,77,109,0.03) 2px, rgba(255,77,109,0.03) 4px
  );
  pointer-events: none;
  border-radius: 8px;
}

.fuel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

.fuel-text {
  font-size: 0.9rem;
  color: #aaa;
  text-align: center;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  background: #ff2e63;
  transform: scale(1.05);
}

/* Heart + ECG */
.heart-ecg-wrap {
  position: relative;
  width: 300px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.heart-ecg-wrap svg.heart-svg {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
  transform-origin: center center;
}

#ecgCanvas {
  position: absolute;
  top: 0; left: 0;
  z-index: 1;
}

/* Heartbeat pulse ring */
.pulse-ring {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 160px; height: 160px;
  border-radius: 999px;
  pointer-events: none;
  z-index: 0;
}

.calendar {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ff4d6d;
  width: 300px;
}

.calendar h3 {
  text-align: center;
  margin-bottom: 10px;
  color: #ff4d6d;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day { text-align: center; padding: 8px 0; border-radius: 50%; }
.past { background-color: #28a745; }
.today { background-color: #ff4d6d; font-weight: bold; }

/* ── DEDICATION POPUP ── */
#dedicationOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeInOverlay 0.6s ease forwards;
}

@keyframes fadeInOverlay {
  from { opacity: 0; }
  to   { opacity: 1; }
}

#dedicationBox {
  background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
  border: 2px solid #ff4d6d;
  border-radius: 20px;
  padding: 40px 36px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,77,109,0.35), 0 0 20px rgba(255,77,109,0.15);
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  position: relative;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}

#dedicationBox .popup-heart {
  font-size: 2.5rem;
  margin-bottom: 16px;
  display: block;
  animation: heartPop 1.2s ease-in-out infinite;
}

@keyframes heartPop {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.15); }
}

#dedicationBox p {
  font-size: 1.05rem;
  color: #e0e0e0;
  line-height: 1.7;
  font-style: italic;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#dedicationBox p em {
  color: #ff9bb3;
  font-style: normal;
  font-weight: bold;
}

#peekBtn {
  padding: 12px 28px;
  font-size: 1rem;
  border-radius: 50px;
  background: linear-gradient(135deg, #ff4d6d, #ff2e63);
  color: white;
  border: none;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(255,77,109,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
}

#peekBtn:hover {
  transform: scale(1.07);
  box-shadow: 0 6px 28px rgba(255,77,109,0.7);
}

#peekBtn:active { transform: scale(0.97); }
</style>
</head>

<script>
// ── DEDICATION POPUP ───────────────────────────────────
function peekIntoLove() {
  const overlay = document.getElementById("dedicationOverlay");
  const song    = document.getElementById("loveSong");
  const main    = document.getElementById("mainContent");

  overlay.style.transition = "opacity 0.6s ease";
  overlay.style.opacity    = "0";
  setTimeout(() => {
    overlay.style.display = "none";
    main.style.visibility = "visible";
    requestAnimationFrame(() => { main.style.opacity = "1"; });
    startPage();
  }, 600);

  song.volume = 0.7;
  song.play().catch(() => {});
  setTimeout(() => document.body.classList.add('revealed'), 400);
}

// ── HASH / REFUEL (global so button works) ────────────
async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
const correctHash = "88d4c34210eaf9e8bd973f8bca42faccdbb60907e2af64d37da46e3dd151b816";
let manualFuel = null;
async function refuel() {
  const input = prompt("Enter the secret code ❤️"); if(!input) return;
  const hash = await sha256(input);
  if(hash===correctHash){ manualFuel=100; alert("Refueled with love ❤️"); }
  else alert("Wrong code 💔");
}

// ── ALL ANIMATIONS — only start after button click ────
function startPage() {

// ── TIMER ──────────────────────────────────────────────
const startDate = new Date("2024-02-24T00:00:00");
function updateTimer() {
  const now = new Date(), diff = now - startDate;
  const s = Math.floor(diff/1000)%60, m = Math.floor(diff/60000)%60,
        h = Math.floor(diff/3600000)%24, d = Math.floor(diff/86400000);
  document.getElementById("timer").innerText =
    `${d} Days ${h} Hours ${m} Minutes ${s} Seconds`;
}
setInterval(updateTimer, 1000); updateTimer();


// ── FUEL ───────────────────────────────────────────────
function getFuelLevel() {
  if (manualFuel !== null) return manualFuel;
  const now = new Date(), day = now.getDay();
  const hoursElapsed = day*24 + now.getHours() + now.getMinutes()/60;
  return Math.max(20, Math.min(100, 100-(hoursElapsed/(7*24))*80));
}


// ── WAVE ───────────────────────────────────────────────
let phase = 0;
function updateWave() {
  const height = 100 - getFuelLevel();
  const wave = document.getElementById("wave");
  let path = `M 0 ${height}`;
  for (let x=0;x<=100;x++) path+=` L ${x} ${height+Math.sin((x+phase)*0.15)*2}`;
  path += ` L 100 100 L 0 100 Z`;
  wave.setAttribute("d", path);
  phase += 2;
}
setInterval(updateWave, 50);


// ── ECG ────────────────────────────────────────────────
const ecgCanvas = document.getElementById("ecgCanvas");
const ctx = ecgCanvas.getContext("2d");
const W = ecgCanvas.width, H = ecgCanvas.height, midY = H/2, amp = 30;

function ecgShape(c) {
  c = c%1;
  if (c<0.10) return 0;
  if (c<0.20) return -Math.sin(((c-0.10)/0.10)*Math.PI)*0.15;
  if (c<0.30) return 0;
  if (c<0.34) return  Math.sin(((c-0.30)/0.04)*Math.PI)*0.10;
  if (c<0.38) return -Math.sin(((c-0.34)/0.04)*Math.PI)*1.00;
  if (c<0.43) return  Math.sin(((c-0.38)/0.05)*Math.PI)*0.30;
  if (c<0.55) return 0;
  if (c<0.75) return -Math.sin(((c-0.55)/0.20)*Math.PI)*0.25;
  return 0;
}

const buf = new Array(W).fill(midY);
let writePos=0, ecgT=0;
const ecgSpeed = 0.007;
// Track when the R spike fires to trigger heartbeat pulse
let lastSpike = false;

function drawECG() {
  ecgT += ecgSpeed;
  const val = ecgShape(ecgT);
  buf[writePos%W] = midY + val*amp;

  // Detect R-spike crossing threshold — fire pulse
  const isSpike = val < -0.7;
  if (isSpike && !lastSpike) triggerPulse();
  lastSpike = isSpike;

  writePos++;
  ctx.clearRect(0,0,W,H);
  ctx.lineWidth=1.8; ctx.lineCap="round"; ctx.lineJoin="round";
  for (let i=1;i<W;i++) {
    const idx=(writePos+i)%W, prev=(writePos+i-1)%W;
    ctx.globalAlpha = i<40 ? (i/40)*0.85 : 0.85;
    ctx.strokeStyle="#ff4d6d";
    ctx.beginPath(); ctx.moveTo(i-1,buf[prev]); ctx.lineTo(i,buf[idx]); ctx.stroke();
  }
  ctx.globalAlpha=1;
  const dotY=buf[(writePos-1+W)%W];
  ctx.beginPath(); ctx.arc(W-1,dotY,3,0,Math.PI*2);
  ctx.fillStyle="#ff9bb3"; ctx.shadowColor="#ff4d6d"; ctx.shadowBlur=10;
  ctx.fill(); ctx.shadowBlur=0;
  requestAnimationFrame(drawECG);
}
drawECG();


// ── HEARTBEAT PULSE RINGS ──────────────────────────────
const pulseCanvas = document.getElementById("pulseCanvas");
const pCtx = pulseCanvas.getContext("2d");
const PW = pulseCanvas.width, PH = pulseCanvas.height;
const cx = PW/2, cy = PH/2;

const pulses = [];

function triggerPulse() {
  pulses.push({ r: 70, alpha: 0.7, born: performance.now() });
  // Also scale the heart SVG
  heartBeat();
}

function heartBeat() {
  const svg = document.getElementById("heartSvg");
  svg.style.transition = "transform 0.1s ease-out";
  svg.style.transform = "translate(-50%,-50%) scale(1.12)";
  setTimeout(()=>{
    svg.style.transition = "transform 0.25s ease-in-out";
    svg.style.transform = "translate(-50%,-50%) scale(1.0)";
  }, 110);
}

function drawPulses() {
  pCtx.clearRect(0,0,PW,PH);
  const now = performance.now();
  for (let i = pulses.length-1; i>=0; i--) {
    const p = pulses[i];
    const age = (now - p.born)/1000; // seconds
    p.r += 1.8;
    p.alpha = Math.max(0, 0.7 - age*1.1);
    if (p.alpha <= 0) { pulses.splice(i,1); continue; }
    pCtx.beginPath();
    // Draw heart-shaped ring by scaling a path — approximate with circle for ring
    pCtx.arc(cx, cy, p.r, 0, Math.PI*2);
    pCtx.strokeStyle = `rgba(255,77,109,${p.alpha})`;
    pCtx.lineWidth = 2;
    pCtx.stroke();
  }
  requestAnimationFrame(drawPulses);
}
drawPulses();


// ── SHOOTING STARS ─────────────────────────────────────
const starsCanvas = document.getElementById("starsCanvas");
const sCtx = starsCanvas.getContext("2d");

function resizeStars() {
  starsCanvas.width  = window.innerWidth;
  starsCanvas.height = window.innerHeight;
}
resizeStars();
window.addEventListener("resize", resizeStars);

// Static twinkling stars
const staticStars = Array.from({length: 120}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random()*1.2+0.3,
  phase: Math.random()*Math.PI*2,
  speed: Math.random()*0.02+0.005
}));

// Shooting stars pool
const shooters = [];

function spawnShooter() {
  const angle = (Math.random()*30 + 20) * Math.PI/180; // 20–50° downward
  const len   = Math.random()*120+60;
  shooters.push({
    x: Math.random()*starsCanvas.width,
    y: Math.random()*(starsCanvas.height*0.5),
    vx: Math.cos(angle)*8,
    vy: Math.sin(angle)*8,
    len,
    alpha: 1,
    tail: []
  });
}

// Spawn a shooter every 2–5 seconds
function scheduleShooter() {
  spawnShooter();
  setTimeout(scheduleShooter, Math.random()*3000+2000);
}
scheduleShooter();

let frameT = 0;
function drawStars(ts) {
  const SW = starsCanvas.width, SH = starsCanvas.height;
  sCtx.clearRect(0,0,SW,SH);

  // Twinkling dots
  staticStars.forEach(s => {
    s.phase += s.speed;
    const a = 0.3+0.5*(Math.sin(s.phase)*0.5+0.5);
    sCtx.beginPath();
    sCtx.arc(s.x*SW, s.y*SH, s.r, 0, Math.PI*2);
    sCtx.fillStyle = `rgba(255,200,210,${a})`;
    sCtx.fill();
  });

  // Shooting stars
  for (let i=shooters.length-1; i>=0; i--) {
    const s = shooters[i];
    s.tail.push({x:s.x, y:s.y});
    if (s.tail.length > 18) s.tail.shift();
    s.x += s.vx; s.y += s.vy;
    s.alpha -= 0.012;

    if (s.alpha<=0 || s.x>SW+50 || s.y>SH+50) { shooters.splice(i,1); continue; }

    // Draw tail gradient
    if (s.tail.length > 1) {
      const grad = sCtx.createLinearGradient(
        s.tail[0].x, s.tail[0].y, s.x, s.y
      );
      grad.addColorStop(0, `rgba(255,77,109,0)`);
      grad.addColorStop(0.5, `rgba(255,150,170,${s.alpha*0.4})`);
      grad.addColorStop(1, `rgba(255,255,255,${s.alpha})`);
      sCtx.beginPath();
      sCtx.moveTo(s.tail[0].x, s.tail[0].y);
      for (const p of s.tail) sCtx.lineTo(p.x, p.y);
      sCtx.lineTo(s.x, s.y);
      sCtx.strokeStyle = grad;
      sCtx.lineWidth = 1.5;
      sCtx.stroke();
    }

    // Head dot
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, 2, 0, Math.PI*2);
    sCtx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    sCtx.fill();
  }

  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);


// ── GLITCH LOVE MESSAGES ───────────────────────────────
const declarations = [
  { lang: "English",       text: "I love you, Ummey" },
  { lang: "Malayalam",     text: "ഞാൻ നിന്നെ സ്നേഹിക്കുന്നു, Ummey" },
  { lang: "Arabic",        text: "أحبكِ يا Ummey" },
  { lang: "French",        text: "Je t'aime, Ummey" },
  { lang: "Spanish",       text: "Te amo, Ummey" },
  { lang: "Portuguese",    text: "Eu te amo, Ummey" },
  { lang: "Italian",       text: "Ti amo, Ummey" },
  { lang: "German",        text: "Ich liebe dich, Ummey" },

  { lang: "Korean",        text: "사랑해, Ummey" },
  { lang: "Mandarin",      text: "我爱你，Ummey" },
  { lang: "Hindi",         text: "मैं तुमसे प्यार करता हूँ, Ummey" },
  { lang: "Bengali",       text: "আমি তোমাকে ভালোবাসি, Ummey" },
  { lang: "Urdu",          text: "میں تم سے محبت کرتا ہوں، Ummey" },
  { lang: "Turkish",       text: "Seni seviyorum, Ummey" },
  { lang: "Persian",       text: "دوستت دارم، Ummey" },
  { lang: "Russian",       text: "Я люблю тебя, Ummey" },
  { lang: "Greek",         text: "Σ' αγαπώ, Ummey" },
  { lang: "Hebrew",        text: "אני אוהב אותך, Ummey" },
  { lang: "Swahili",       text: "Nakupenda, Ummey" },

// ── CALENDAR ───────────────────────────────────────────
function generateCalendar() {
  const now=new Date(), year=now.getFullYear(), month=now.getMonth(), today=now.getDate();
  const firstDay=new Date(year,month,1).getDay(), lastDate=new Date(year,month+1,0).getDate();
  const calendarDays=document.getElementById("calendarDays");
  const monthYear=document.getElementById("monthYear");
  const monthNames=["January","February","March","April","May","June",
    "July","August","September","October","November","December"];
  monthYear.innerText=`${monthNames[month]} ${year}`;
  calendarDays.innerHTML="";
  for(let i=0;i<firstDay;i++) calendarDays.innerHTML+=`<div></div>`;
  for(let day=1;day<=lastDate;day++){
    let cls="day";
    if(day<today) cls+=" past";
    if(day===today) cls+=" today";
    calendarDays.innerHTML+=`<div class="${cls}">${day}</div>`;
  }
}
generateCalendar();
